background {
    monitor =
    path = $HOME/.config/hypr/wallpapers/gruv-abstract-maze.png

    blur_passes = 2 # 0 disables blurring
    blur_size = 3
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor = HDMI-A-1
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(0f0f0f)
    inner_color = rgb(0f0f0f)
    font_color = rgb(c8c8c8)
    fade_on_empty = true
    fade_timeout = 3000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgb(005A9C)
    fail_color = rgb(204, 34, 34) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    #Hour
    text = cmd[update:1000] date "+%H"
    color = rgb(ebdbb2)
    font_size = 40
    font_family = Fira Semibold
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}
label {
    monitor =
    #Second
    text = cmd[update:1000] date "+%M"
    color = rgb(ebdbb2)
    font_size = 40
    font_family = Fira Semibold
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}
label {
    monitor =
    #Date
    text = cmd[update:1000] date "+%d/%m"
    color = rgb(ebdbb2)
    font_size = 40
    font_family = Fira Semibold
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}
label {
	monitor =
	text = "$LAYOUT"
	color = rgb(ebdbb2)
    	font_size = 20
    	font_family = Fira Semibold
    	position = 0, 0
    	halign = right
    	valign = bottom
    	shadow_passes = 5
    	shadow_size = 10
}
label {
    # Монитор (оставьте пустым для всех, или укажите конкретный, например "DP-1")
    monitor =

    # Текст кнопки (можно использовать Pango разметку)
    text = <span foreground="##f9c784">⏾ Сон</span>
    text_align = center
    color = rgb(ebdbb2)
    font_size = 18
    font_family = Ubuntu

    # Позиция на экране (центр по горизонтали, низ по вертикали)
    position = 1, 50
    halign = center
    valign = bottom

    # САМОЕ ВАЖНОЕ: команда, которая выполняется при клике
    onclick = systemctl suspend

    # Необязательно: тень для лучшей читаемости
    shadow_passes = 1
    shadow_size = 4
}

}
