# ============================================
# Gruvbox Dark Theme для Yazi
# bg = #282828
# fg = #ebdbb2
# ============================================

# -------------------- Файлы и папки --------------------
[theme]
[icon]
dirs=[
{name="Downloads",text="",fg="#282828"},
]
conds=[
{if = "dir",text="",fg="#ebdbb2"},
]
[filetype]
rules = [
    # Папки — оранжевый, жирный
    { mime = "*/", fg = "#ebdbb2", bold = true },
    
    # Символьные ссылки — голубой, курсив
    { is = "link", fg = "#689d6a", italic = true },
    
    # Исполняемые файлы — зеленый
    { is = "exec", fg = "#98971a" },
    
    # Изображения — пурпурный
    { mime = "image/*", fg = "#b16286" },
    
    # Видео — аква
    { mime = "video/*", fg = "#689d6a" },
    
    # Аудио — аква
    { mime = "audio/*", fg = "#689d6a" },
    
    # Архивы — желтый
    { mime = "application/{zip,rar,7z*,tar,gzip,bzip2,xz}", fg = "#d79921" },
    
    # Документы (PDF, DOC и т.д.) — красный
    { mime = "application/{pdf,msword,*-word}", fg = "#cc241d" },
    
    # Текстовые файлы и код — зеленый
    { mime = "text/*", fg = "#98971a" },
    
    # Файлы по умолчанию
    { name = "*", fg = "#ebdbb2" },
]

# -------------------- Вкладки (сверху) --------------------
[tabs]
active = { fg = "#282828", bg = "#ebdbb2", bold = true }
inactive = { fg = "#ebdbb2", bg = "#3c3836" }

# -------------------- Строка состояния (внизу) --------------------
[status]
# Базовые стили
default = { fg = "#ebdbb2", bg = "#282828" }

# Разделители
separator = { fg = "#928374" }

# Права доступа (rwx)
perm_read = { fg = "#98971a" }
perm_write = { fg = "#d79921" }
perm_exec = { fg = "#cc241d" }

# Выделенный текст
selected = { fg = "#fe8019", bold = true }

# -------------------- Выделение (selection) --------------------
[select]
# Текущий выбранный элемент
current = { fg = "#ebdbb2", bold = true }
# Обычное выделение
selected = { bg = "#3c3836" }

# -------------------- Заголовок панели --------------------
[header]
default = { fg = "#928374" }
current = { fg = "#fe8019", bold = true }

# -------------------- Окно помощи --------------------
[help]
desc = { fg = "#928374" }
key = { fg = "#fe8019", bold = true }
separator = { fg = "#3c3836" }
